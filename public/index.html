<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KetickSpace | Santai & Modular</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="../src/styles/main.css">
    
    <style>
        /* Font khusus untuk vibe developer */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
        }
        
        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col overflow-hidden">

    <nav class="p-4 border-b border-[#30363d] flex justify-between items-center bg-[#0d1117] sticky top-0 z-50">
        <h1 class="text-xl font-bold tracking-tight">Ketick<span class="neon-text neon-glow">Space</span></h1>
        <div id="user-status" class="text-xs bg-[#21262d] px-3 py-1 rounded-full border border-[#30363d] transition-all duration-500">
            Offline
        </div>
    </nav>

    <main class="flex-grow p-4 space-y-6 overflow-y-auto pb-24">
        
        <section class="py-4 animate-in fade-in slide-in-from-bottom-4 duration-700">
            <h2 class="text-2xl font-semibold italic">Selamat datang, Developer.</h2>
            <p class="text-sm text-gray-400 mt-1">Ruang untuk bersantai, berbual, dan kumpul idea.</p>
        </section>

        <div class="grid grid-cols-2 gap-4">
            <div class="ketick-card p-6 flex flex-col items-center justify-center space-y-3 cursor-pointer">
                <span class="text-3xl">💬</span>
                <span class="text-sm font-semibold tracking-wide">The Lounge</span>
            </div>

            <div class="ketick-card p-6 flex flex-col items-center justify-center space-y-3 cursor-pointer">
                <span class="text-3xl">🎮</span>
                <span class="text-sm font-semibold tracking-wide">Arcade</span>
            </div>

            <div class="ketick-card p-6 flex flex-col items-center justify-center space-y-3 cursor-pointer">
                <span class="text-3xl">📚</span>
                <span class="text-sm font-semibold tracking-wide">Library</span>
            </div>

            <div class="ketick-card p-6 flex flex-col items-center justify-center space-y-3 cursor-pointer">
                <span class="text-3xl">📻</span>
                <span class="text-sm font-semibold tracking-wide">Radio</span>
            </div>
        </div>

    </main>

    <footer class="fixed bottom-0 left-0 right-0 p-4 bg-[#0d1117]/80 backdrop-blur-md border-t border-[#30363d]">
        <div class="flex justify-around items-center max-w-md mx-auto">
            <button class="flex flex-col items-center neon-text transition-transform active:scale-90">
                <span class="text-xl">🏠</span>
                <span class="text-[10px] mt-1 font-bold uppercase tracking-widest">Home</span>
            </button>
            <button class="flex flex-col items-center text-gray-500 hover:text-white transition-transform active:scale-90">
                <span class="text-xl">⚙️</span>
                <span class="text-[10px] mt-1 font-bold uppercase tracking-widest">Settings</span>
            </button>
        </div>
    </footer>

    <script type="module" src="../src/main.js"></script>
</body>
</html>
